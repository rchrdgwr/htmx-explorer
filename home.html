<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Introduction to htmx - build dynamic web apps with HTML without JavaScript frameworks">
  <meta name="keywords" content="htmx, HTML, web development, dynamic web apps">
  <title>Introduction to htmx - Alamo Python</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #fff;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .group-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e94560;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 37px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    h1 span { color: #e94560; }

    .tagline {
      font-size: 20px;
      color: #888;
      margin-bottom: 36px;
      max-width: 380px;
      line-height: 1.6;
    }

    /* htmx "pill" badges */
    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
    }

    .badge {
      background: #4389bf;
      border: 1px solid #4389bf;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 17px;
      font-family: monospace;
      color: #fff;
    }

    /* Big concept count */
    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 36px;
    }

    .stat { text-align: center; }
    .stat .num {
      font-size: 45px;
      font-weight: 800;
      color: #e94560;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-top: 4px;
    }

    .cta {
      font-size: 18px;
      color: #666;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .divider {
      width: 40px; height: 2px;
      background: #e94560;
      margin: 0 auto 28px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="group-name">Alamo Python</div>

  <h1>Introduction to <span>htmx</span></h1>

  <div class="divider"></div>

  <p class="tagline">
    Build dynamic web apps with HTML 
  </br>
    No JavaScript framework required.
      </br>
    Server returns HTML, not JSON. 
      </br>
    The browser does the rest.
  </p>

  <div class="badges">
    <span class="badge">hx-get</span>
    <span class="badge">hx-post</span>
    <span class="badge">hx-target</span>
    <span class="badge">hx-swap</span>
    <span class="badge">hx-trigger</span>
    <span class="badge">hx-swap-oob</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="num">16</div><div class="lbl">Concepts</div></div>
    <div class="stat"><div class="num">6</div><div class="lbl">Core attrs</div></div>
    <div class="stat"><div class="num">0</div><div class="lbl">JS written</div></div>
  </div>

  <div class="cta">← Select a concept to get started</div>

</body>
</html>
