<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple GET</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 20px; font-size: 14px; }
    button {
      padding: 9px 20px; background: #0066cc; color: #fff;
      border: none; border-radius: 5px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #0052a3; }
    #result { margin-top: 16px; min-height: 40px; }
  </style>
</head>
<body>
  <h2>Simple GET</h2>
  <p>Click the button — htmx fires a GET request and swaps the response into <code>#result</code>. No JavaScript needed.</p>

  <button hx-get="responses/hello.html" hx-target="#result">
    Load Content
  </button>

  <div id="result"></div>
</body>
</html>
