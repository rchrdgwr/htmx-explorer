<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTTP Verbs</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 20px; font-size: 14px; }
    .verb-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    button { padding: 8px 16px; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: monospace; min-width: 110px; }
    .get    { background: #1976d2; }
    .post   { background: #2e7d32; }
    .put    { background: #f57c00; }
    .delete { background: #c62828; }
    .label  { font-size: 12px; color: #888; }
    #result { margin-top: 20px; min-height: 40px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>HTTP Verbs</h2>
  <p>Each button uses a different HTTP method. Watch the inspector panel to see the verb change.</p>

  <div class="verb-row">
    <button class="get" hx-get="responses/verb-response.html" hx-target="#result">hx-get</button>
    <span class="label">Fetch / read data</span>
  </div>
  <div class="verb-row">
    <button class="post" hx-post="responses/verb-response.html" hx-target="#result">hx-post</button>
    <span class="label">Create a record</span>
  </div>
  <div class="verb-row">
    <button class="put" hx-put="responses/verb-response.html" hx-target="#result">hx-put</button>
    <span class="label">Replace a resource</span>
  </div>
  <div class="verb-row">
    <button class="delete" hx-delete="responses/verb-response.html" hx-target="#result">hx-delete</button>
    <span class="label">Remove a resource</span>
  </div>

  <div id="result"></div>
</body>
</html>
