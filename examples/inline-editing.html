<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline Editing</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 20px; font-size: 14px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .field { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .field-label { font-size: 12px; color: #888; width: 80px; flex-shrink: 0; }
    .field-value { font-size: 15px; color: #222; flex: 1; }
    .edit-btn { padding: 4px 12px; background: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; color: #555; }
    .edit-btn:hover { border-color: #1976d2; color: #1976d2; }
  </style>
</head>
<body>
  <h2>Inline Editing</h2>
  <p>Click Edit on any field. The server returns a form. Save returns the updated value. No page reload.</p>

  <div id="name-field" class="field">
    <span class="field-label">Name</span>
    <span class="field-value">Ada Lovelace</span>
    <button class="edit-btn"
            hx-get="responses/edit-form.html?field=name&value=Ada+Lovelace"
            hx-target="#name-field"
            hx-swap="outerHTML">Edit</button>
  </div>

  <div id="role-field" class="field">
    <span class="field-label">Role</span>
    <span class="field-value">Engineer</span>
    <button class="edit-btn"
            hx-get="responses/edit-form.html?field=role&value=Engineer"
            hx-target="#role-field"
            hx-swap="outerHTML">Edit</button>
  </div>

  <div id="city-field" class="field">
    <span class="field-label">City</span>
    <span class="field-value">London</span>
    <button class="edit-btn"
            hx-get="responses/edit-form.html?field=city&value=London"
            hx-target="#city-field"
            hx-swap="outerHTML">Edit</button>
  </div>
</body>
</html>
