<div id="name-field" class="field" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;">
  <span style="font-size:12px;color:#888;width:80px;flex-shrink:0;">Field</span>
  <input type="text" value="Ada Lovelace"
         style="font-size:14px;padding:6px 10px;border:1px solid #1976d2;border-radius:4px;flex:1;"
         name="value">
  <button style="padding:5px 12px;background:#2e7d32;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;"
          hx-post="responses/edit-saved.html"
          hx-target="closest div"
          hx-swap="outerHTML">Save</button>
  <button style="padding:5px 12px;background:none;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:12px;"
          hx-get="responses/edit-cancel.html"
          hx-target="closest div"
          hx-swap="outerHTML">Cancel</button>
</div>
