<div style="font-size:13px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div id="dash-users" style="background:#e3f2fd;border-radius:6px;padding:12px;text-align:center;"
         hx-get="responses/dash-users.html" hx-trigger="every 3s" hx-swap="outerHTML">
      <div style="font-size:22px;font-weight:700;color:#1976d2;" id="du"></div>
      <div style="font-size:11px;color:#888;margin-top:4px;">Active Users</div>
      <script>document.getElementById('du').textContent = Math.floor(Math.random()*100+50);</script>
    </div>
    <div id="dash-jobs" style="background:#e8f5e9;border-radius:6px;padding:12px;text-align:center;"
         hx-get="responses/dash-jobs.html" hx-trigger="every 3s" hx-swap="outerHTML">
      <div style="font-size:22px;font-weight:700;color:#2e7d32;" id="dj"></div>
      <div style="font-size:11px;color:#888;margin-top:4px;">Jobs Queued</div>
      <script>document.getElementById('dj').textContent = Math.floor(Math.random()*20);</script>
    </div>
  </div>
  <div style="color:#888;font-size:11px;">Both widgets poll independently every 3 seconds via <code>hx-trigger="every 3s"</code>.</div>
</div>
