<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polling</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 20px; font-size: 14px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .clock {
      font-size: 42px; font-weight: 700; color: #1a1a2e;
      font-family: monospace; padding: 24px;
      background: #f8f8f8; border-radius: 10px;
      text-align: center; margin: 20px 0;
      border: 2px solid #e0e0e0;
    }
    .note { font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h2>Polling</h2>
  <p>This clock refreshes itself every 2 seconds using <code>hx-trigger="every 2s"</code>. No JavaScript, no <code>setInterval</code>.</p>

  <div id="clock"
       hx-get="responses/poll-time.html"
       hx-target="this"
       hx-trigger="every 2s load">
    Loading...
  </div>

  <p class="note">Watch the Response Received panel update automatically every 2 seconds.</p>
</body>
</html>
