<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Infinite Scroll</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 16px; font-size: 14px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .item {
      padding: 12px 16px; margin-bottom: 8px;
      background: #f8f8f8; border-radius: 6px;
      border-left: 3px solid #1976d2; font-size: 14px;
    }
    .sentinel {
      padding: 12px; text-align: center;
      color: #888; font-size: 13px;
      border: 1px dashed #ccc; border-radius: 6px;
      margin-top: 8px;
    }
    #list { max-height: 340px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>Infinite Scroll</h2>
  <p>Scroll to the bottom of the list — the sentinel element detects it entered the viewport and loads the next page.</p>

  <div id="list">
    <div class="item">Record 1 — Python basics</div>
    <div class="item">Record 2 — List comprehensions</div>
    <div class="item">Record 3 — Decorators</div>
    <div class="item">Record 4 — Context managers</div>
    <div class="item">Record 5 — Generators</div>

    <!-- Sentinel: when it enters the viewport, loads the next page -->
    <div class="sentinel"
         hx-get="responses/more-items.html"
         hx-trigger="revealed"
         hx-swap="outerHTML">
      Scroll down to load more...
    </div>
  </div>
</body>
</html>
