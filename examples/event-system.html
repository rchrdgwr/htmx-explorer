<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event System</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 520px; }
    h2   { margin-bottom: 8px; }
    p    { color: #555; margin-bottom: 20px; font-size: 14px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .panel { padding: 16px; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 16px; }
    .panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: #888; margin-bottom: 10px; }
    input[type=text] { padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 60%; margin-right: 8px; }
    button { padding: 7px 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #e94560; }
    .record { padding: 8px 12px; background: #f5f5f5; border-radius: 4px; margin-bottom: 6px; font-size: 13px; display: flex; justify-content: space-between; }
    #log { font-family: monospace; font-size: 12px; color: #444; }
    .log-line { padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
    .log-line .time { color: #888; }
    .log-line .event { color: #e94560; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Event System</h2>
  <p>The form and the list don't know about each other. They communicate through a custom event on <code>document.body</code>.</p>

  <!-- Save form -->
  <div class="panel">
    <div class="panel-label">Add a record (fires "record-saved" event on success)</div>
    <form hx-post="responses/save-record.html"
          hx-target="#save-result"
          hx-on:htmx:after-request="htmx.trigger(document.body, 'record-saved'); logEvent('record-saved')">
      <input type="text" name="name" placeholder="Enter a name...">
      <button type="submit">Save</button>
    </form>
    <div id="save-result" style="margin-top:8px;font-size:13px;color:#2e7d32;"></div>
  </div>

  <!-- Record list listens for event -->
  <div class="panel">
    <div class="panel-label">Record list (refreshes on "record-saved" event)</div>
    <div id="record-list"
         hx-get="responses/record-list.html"
         hx-trigger="load, record-saved from:body">
      Loading...
    </div>
  </div>

  <!-- Event log -->
  <div class="panel">
    <div class="panel-label">Event log</div>
    <div id="log"><div class="log-line" style="color:#bbb;">Waiting for events...</div></div>
  </div>

  <script>
    let count = 0;
    function logEvent(name) {
      const log = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span> — <span class="event">${name}</span> fired`;
      if (log.querySelector('[style*="color:#bbb"]')) log.innerHTML = '';
      log.prepend(line);
    }
  </script>
</body>
</html>
