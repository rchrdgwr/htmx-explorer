<div id="role-field" class="field">
  <span class="field-label">Role</span>
  <input type="text" value="Engineer" class="field-input" name="value">
  <button class="save-btn"
          hx-post="response_inline-editing_role_saved.html"
          hx-target="closest div"
          hx-swap="outerHTML">Save</button>
  <button class="edit-btn"
          hx-get="response_inline-editing_role_cancel.html"
          hx-target="closest div"
          hx-swap="outerHTML">Cancel</button>
</div>
