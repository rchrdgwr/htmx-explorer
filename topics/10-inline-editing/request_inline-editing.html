<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive demo: click a field to edit it in place and save with htmx.">
  <meta name="keywords" content="htmx, inline editing, click-to-edit, hx-get, hx-put, demo">
  <title>Inline Editing</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/css/examples.css">
  <link rel="stylesheet" href="/css/responses.css">
</head>
<body class="page-inline-editing">
  <h2>Inline Editing</h2>
  <p>Click Edit on any field. The server returns a form. Save returns the updated value. No page reload.</p>

  <div id="name-field" class="field">
    <span class="field-label">Name</span>
    <span class="field-value">Ada Lovelace</span>
    <button class="edit-btn"
            hx-get="response_inline-editing_name_form.html"
            hx-target="#name-field"
            hx-swap="outerHTML">Edit</button>
  </div>

  <div id="role-field" class="field">
    <span class="field-label">Role</span>
    <span class="field-value">Engineer</span>
    <button class="edit-btn"
            hx-get="response_inline-editing_role_form.html"
            hx-target="#role-field"
            hx-swap="outerHTML">Edit</button>
  </div>

  <div id="city-field" class="field">
    <span class="field-label">City</span>
    <span class="field-value">London</span>
    <button class="edit-btn"
            hx-get="response_inline-editing_city_form.html"
            hx-target="#city-field"
            hx-swap="outerHTML">Edit</button>
  </div>
</body>
</html>
