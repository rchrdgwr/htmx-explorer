<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Request</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/css/examples.css">
  <link rel="stylesheet" href="/css/responses.css">
</head>
<body class="page-basic-request">
  <h2>Basic Request</h2>
  <p>Click the button — htmx fires a GET request and swaps the HTML response into <code>#result</code>. No JavaScript needed.</p>

  <button hx-get="response_basic-request.html" hx-target="#result">
    Say Hello
  </button>

  <div id="result"></div>
</body>
</html>
