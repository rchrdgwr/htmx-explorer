<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>hx-push-url</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/css/examples.css">
  <link rel="stylesheet" href="/css/responses.css">
</head>
<body class="page-hx-push-url">
  <h2>hx-push-url</h2>
  <p>Type a search term — the URL updates as you type so results are bookmarkable and shareable. Hit your browser's back button to go back.</p>

  <div class="url-display" id="url-display">URL: <span id="current-url"></span></div>

  <input type="text" name="q" placeholder="Search Python topics..."
         hx-get="response_hx-push-url.html"
         hx-target="#results"
         hx-trigger="keyup changed delay:400ms"
         hx-push-url="true">

  <div id="results">
    <div class="result-item">Start typing to search...</div>
  </div>

  <script>
    function updateUrlDisplay() {
      document.getElementById('current-url').textContent = window.location.href;
    }
    updateUrlDisplay();
    document.addEventListener('htmx:pushedIntoHistory', updateUrlDisplay);
  </script>
</body>
</html>
